<!DOCTYPE html>
<html>
<head>
    <link rel="manifest" href="/static/manifest.json">
    <title>Gym POS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            margin: 20px;
            background: #f5f5f5;
        }

        .nav {
            margin-bottom: 20px;
            font-size: 18px;
        }

        .nav a {
            margin-right: 15px;
            text-decoration: none;
        }

        .container {
            padding: 20px;
            max-width: 500px;
            margin: auto;
        }
        h1 {
            text-align: center;
        }
        

        input, select {
            width: 100%;
            padding: 16px;
            font-size: 20px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 20px;
            font-size: 22px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background-color: #218838;
        }

        .message {
            margin-top: 15px;
            font-size: 18px;
            color: green;
        }

        .qr {
            margin-top: 20px;
        }

        table {
            margin-top: 30px;
            width: 100%;
            border-collapse: collapse;
        }

        td, th {
            border: 1px solid #ccc;
            padding: 8px;
        }
    </style>
</head>
<body>

<div class="nav">
    <a href="/">🏠 Home</a>
    <a href="/scan">📷 Scan</a>
    <a href="/members">👥 Members</a>
    <a href="/dashboard">📊 Dashboard</a>
    <a href="/logout">🚪 Logout</a>
    <a href="/logs">📜 Logs</a>
    <a href="/analytics">📈 Analytics</a>
    <a href="/phone-check">📱 Phone Check</a>
</div>

<div class="container">

<h1>🏋️ Gym POS</h1>
<input type="text" id="name" placeholder="Customer Name">
<input type="text" id="phone" placeholder="Phone Number">

<div class="grid">
    <button onclick="selectItem('Monthly',1500,this)">Monthly<br>1500</button>
    <button onclick="selectItem('Day Pass',200,this)">Day Pass<br>200</button>
    <button onclick="selectItem('Drink',50,this)">Drink<br>50</button>
</div>

<div id="selected" class="selected-box"></div>

<button class="confirm-btn" onclick="submitPayment()">
    💰 Confirm
</button>

{% if message %}
<div class="message">{{ message }}</div>
{% endif %}

{% if qr %}
<div class="qr">
    <h3>Membership QR</h3>
    <img src="{{ qr }}" width="200">
</div>
{% endif %}

<h3>Recent Transactions</h3>

<table>
<tr>
    <th>Name</th>
    <th>Item</th>
    <th>Amount</th>
    
</tr>

{% for t in transactions %}
<tr>
    <td>{{ t[1] }}</td>
    <td>{{ t[2] }}</td>
    <td>{{ t[3] }}</td>
</tr>
{% endfor %}
</table>

</div>

<script>
    let selectedItem = "";
    
    function selectItem(item, price, btn) {
        selectedItem = item;

        document.getElementById("selected").innerText =
            "Selected: " + item + " (" + price + " THB)";

        // reset all buttons
        document.querySelectorAll("button").forEach(b => {
            b.style.backgroundColor = "#218838";
        });

        // highlight selected
        btn.style.backgroundColor = "#382188";
    }
    
    function submitPayment() {
        let name = document.getElementById("name").value;
        let phone = document.getElementById("phone").value;
    
        console.log("DEBUG FRONT:", name, phone, selectedItem);
    
        if (!name || !phone || !selectedItem) {
            alert("Enter name, phone, and select item");
            return;
        }
    
        let form = document.createElement("form");
        form.method = "POST";
        form.action = "/payment";
    
        let fields = {
            name: name,
            phone: phone,
            item: selectedItem
        };
    
        for (let key in fields) {
            let input = document.createElement("input");
            input.type = "hidden";
            input.name = key;
            input.value = fields[key];
            form.appendChild(input);
        }
    
        document.body.appendChild(form);
        form.submit();
    }
    </script>

</body>
</html>
