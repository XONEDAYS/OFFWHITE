{% extends 'base.html' %}{% block content %}
<div class="form-card">
  <h2>Change Password</h2>
  <form method="post">
    <label>Current Password</label>
    <input name="current_password" type="password" required>
    <label>New Password</label>
    <input name="new_password" type="password" minlength="8" required>
    <label>Confirm New Password</label>
    <input name="confirm_password" type="password" minlength="8" required>
    <button class="btn full">Update Password</button>
  </form>
  <p class="hint">Use at least 8 characters.</p>
</div>
{% endblock %}
