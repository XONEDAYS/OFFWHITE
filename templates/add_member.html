{% extends 'base.html' %}{% block content %}<div class="form-card"><h2>Add member at front desk</h2><form method="post"><label>Name</label><input name="name" required><label>Email</label><input name="email" type="email" required><label>Phone number</label><input name="phone" type="tel" placeholder="08xxxxxxxx" required><label>Temporary password</label><input name="password" value="123456"><label>Activate plan now</label><select name="plan"><option value="">No plan</option>{% for key,p in plans.items() %}<option value="{{key}}">{{p.name}} — ฿{{p.price}}</option>{% endfor %}</select><button class="btn full">Add member</button></form></div>{% endblock %}
