<!DOCTYPE html>
<html>
<head><link rel="manifest" href="/static/manifest.json"><title>Logs</title></head>
<body>
<div>
    <a href="/">🏠 Home</a> |
    <a href="/scan">📷 Scan</a> |
    <a href="/members">👥 Members</a> |
    <a href="/dashboard">📊 Dashboard</a> |
    <a href="/logs">📜 Logs</a> |
    <a href="/logout">🚪 Logout</a>
</div>
<h1>📜 Entry Logs</h1>
<table border="1">
<tr>
    <th>Name</th>
    <th>Time</th>
    <th>Muscle</th>
    <th>Note</th>
    <th>Result</th>
</tr>
{% for l in logs %}
<tr>
    <td>{{ l['name'] }}</td>
    <td>{{ l['datetime'] }}</td>
    <td>{{ l['muscle_group'] or '-' }}</td>
    <td>{{ l['note'] or '-' }}</td>
    <td>{{ l['result'] or 'valid' }}</td>
</tr>
{% endfor %}
</table>
</body>
</html>
