<!DOCTYPE html>
<html>
<head>
    <link rel="manifest" href="/static/manifest.json">
    <title>Members</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .valid { background-color: #e8f5e9; }
        .soon { background-color: #fff3cd; }
        .expired { background-color: #f8d7da; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border: 1px solid #ccc; }
        a { color: black; }
    </style>
</head>
<body>
<div style="margin-bottom:20px;">
    <a href="/">🏠 Home</a> |
    <a href="/scan">📷 Scan</a> |
    <a href="/members">👥 Members</a> |
    <a href="/dashboard">📊 Dashboard</a> |
    <a href="/logs">📜 Logs</a> |
    <a href="/logout">🚪 Logout</a>
</div>

<h1>👥 Members</h1>
<input type="text" id="searchInput" placeholder="Search member..." onkeyup="searchMember()" style="width:100%; padding:10px; font-size:16px;">
<table id="memberTable">
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Phone</th>
    <th>Expiry</th>
    <th>Status</th>
    <th>Renew</th>
    <th>QR</th>
</tr>
{% for m in members %}
<tr class="{{ m.status }}">
    <td>{{ m.id }}</td>
    <td><a href="/member/{{ m.id }}"><strong>{{ m.name }}</strong></a></td>
    <td>{{ m.phone }}</td>
    <td>{{ m.expiry }}</td>
    <td>{{ m.status }}</td>
    <td>
        <form action="/renew/{{ m.id }}" method="post">
            <button type="submit">Renew</button>
        </form>
    </td>
    <td><a href="/regenerate/{{ m.id }}">🔄 Regenerate QR</a></td>
</tr>
{% endfor %}
</table>

<script>
function searchMember() {
    let input = document.getElementById("searchInput").value.toLowerCase();
    let rows = document.getElementById("memberTable").getElementsByTagName("tr");
    for (let i = 1; i < rows.length; i++) {
        let text = rows[i].innerText.toLowerCase();
        rows[i].style.display = text.includes(input) ? "" : "none";
    }
}
</script>
</body>
</html>
