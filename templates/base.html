<!DOCTYPE html>
<html>
<head>
    <title>Gym</title>
</head>
<body>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #f7f7f7;
            color: #111;
        }
        
        /* NAV */
        .nav {
            display: flex;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 2px solid black;
            background: white;
            font-weight: 600;
            letter-spacing: 1px;
        }
        
        .nav a {
            text-decoration: none;
            color: black;
            margin-right: 15px;
        }
        
        /* LAYOUT */
        .container {
            max-width: 480px;
            margin: auto;
            padding: 20px;
        }
        
        /* INPUT */
        input {
            width: 100%;
            padding: 18px;
            margin: 10px 0;
            font-size: 18px;
            border: 2px solid black;
            background: white;
        }
        
        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        
        /* BUTTON */
        button {
            padding: 20px;
            font-size: 18px;
            border: 2px solid black;
            background: white;
            font-weight: 600;
            letter-spacing: 1px;
            transition: 0.15s;
        }
        
        button.active {
            background: black;
            color: white;
        }
        
        /* CONFIRM */
        .confirm {
            margin-top: 20px;
            width: 100%;
            background: black;
            color: white;
        }
        
        /* LABEL */
        .label {
            font-size: 12px;
            letter-spacing: 2px;
            color: #777;
            margin-top: 20px;
        }
        
        /* BIG TEXT */
        .big {
            font-size: 28px;
            font-weight: 800;
        }
        
        /* ACCENT */
        .accent {
            color: #ff3c00;
        }
        </style>
<div class="nav">
    <a href="/">Home</a>
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
