{% extends 'base.html' %}{% block content %}
<div class="form-card">
  <h2>Reset password</h2>
  <p class="hint">Member: <b>{{ user.name }}</b><br>{{ user.email }} · {{ user.phone or 'no phone' }}</p>
  <form method="post">
    <label>New password</label>
    <input name="new_password" type="password" minlength="8" required>
    <label>Confirm new password</label>
    <input name="confirm_password" type="password" minlength="8" required>
    <button class="btn full">Reset password</button>
  </form>
  <p class="hint"><a href="{{ url_for('member_detail', user_id=user.id) }}">Back to member detail</a></p>
</div>
{% endblock %}
